<!doctype html>
<html>
  <head>
    <title>Form 2</title>
  </head>

  <body>
    <h1>Registration</h1>
    <p>Please complete all fields below.</p>
    <hr />

    <form method="post">
      <div class="inputField">
        <label for="name">Full Name</label>
        <input type="text" placeholder="Jane Doe" name="name" id="name" />
      </div>

      <div class="inputField">
        <label for="psCode">Postal Code</label>
        <input type="number" placeholder="10001" name="psCode" id="psCode" />
      </div>

      <div class="inputField">
        <label for="dob">Date of Birth</label>
        <input type="date" name="dob" id="dob" />
      </div>

      <div class="inputField">
        <label for="email">Email Address</label>
        <input
          type="email"
          placeholder="jane@example.com"
          name="email"
          id="email"
        />
      </div>

      <div class="inputField">
        <label for="pass">Password</label>
        <input type="password" placeholder="********" name="pass" id="pass" />
      </div>

      <div class="inputField">
        <label for="country">Country</label>
        <select name="country" id="country">
          <option value="null">Select a country</option>
          <option value="bd">Bangladesh</option>
          <option value="ind">India</option>
          <option value="jpn">Japan</option>
        </select>
      </div>

      <div class="button">
        <button type="submit" class="buttonPrimary">Submit</button>
        <button type="reset" class="buttonSecondary">Reset</button>
      </div>
    </form>
  </body>
</html>
